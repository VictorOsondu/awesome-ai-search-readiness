name: Link check

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # --accept 200,206,403,429: many AI/SEO/news sites (Reddit, Substack,
          # Perplexity, OpenAI, Search Engine Land, CourtListener) return 403
          # to bot user-agents; 429 is rate-limiting. Both are false positives
          # for our purposes — the page exists and resolves in a real browser.
          # --user-agent: identify as a real browser so we get blocked less.
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --accept 200,206,403,429
            --user-agent "Mozilla/5.0 (compatible; awesome-ai-search-readiness-linkcheck/1.0; +https://github.com/VictorOsondu/awesome-ai-search-readiness)"
            "./**/*.md"
          fail: true
          output: ./lychee-out.md

      - name: Open issue on broken links
        if: ${{ github.event_name != 'pull_request' && (failure() || env.lychee_exit_code != '0') }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link check found broken links"
          content-filepath: ./lychee-out.md
          labels: link-rot
