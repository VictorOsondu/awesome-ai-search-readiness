name: Link check

on:
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  push:
    paths:
      - "**/*.md"
  pull_request:
    paths:
      - "**/*.md"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --verbose --no-progress --max-concurrency 8 "./**/*.md"
          fail: true
          output: ./lychee-out.md

      - name: Open issue on broken links
        if: ${{ github.event_name != 'pull_request' && (failure() || env.lychee_exit_code != '0') }}
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link check found broken links"
          content-filepath: ./lychee-out.md
          labels: link-rot
